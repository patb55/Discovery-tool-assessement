<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Background -->
  <rect width="500" height="500" fill="white" rx="10"/>
  
  <!-- Circuit pattern background -->
  <path d="M 100 150 L 150 150 L 150 180 M 150 150 L 200 150 M 200 120 L 200 150 L 250 150 M 250 150 L 300 150 L 300 180 M 300 150 L 350 150" 
        stroke="#E0E7FF" stroke-width="2" fill="none"/>
  
  <!-- Circuit nodes -->
  <circle cx="150" cy="150" r="6" fill="#C7D2FE"/>
  <circle cx="200" cy="150" r="6" fill="#C7D2FE"/>
  <circle cx="250" cy="150" r="6" fill="#C7D2FE"/>
  <circle cx="300" cy="150" r="6" fill="#C7D2FE"/>
  
  <!-- Main PBC -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <text x="250" y="280" font-family="Arial, sans-serif" font-size="150" font-weight="bold" fill="url(#blueGradient)" text-anchor="middle">PBC</text>
  
  <!-- Bottom circuit -->
  <path d="M 150 330 L 200 330 M 250 330 L 300 330 M 225 330 L 225 360 M 275 330 L 275 360" 
        stroke="#3B82F6" stroke-width="2" fill="none"/>
  <circle cx="225" cy="330" r="5" fill="#3B82F6"/>
  <circle cx="275" cy="330" r="5" fill="#3B82F6"/>
  
  <!-- Tagline -->
  <text x="250" y="400" font-family="Arial, sans-serif" font-size="16" fill="#64748B" text-anchor="middle" font-weight="500">SUPPLY CHAIN × ISO 20022</text>
</svg>